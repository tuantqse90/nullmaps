# Local-dev overrides — auto-merged by `docker compose` (NOT used in prod).
#
# Re-publishes the engine ports so the `make *-test` smoke targets can curl
# localhost:2322 / :8010 / etc. directly. In prod (Coolify) you deploy the base
# docker-compose.yml ALONE, so only the gateway is exposed.
#
# Prod deploy: docker compose -f docker-compose.yml up -d   (no override)

services:
  martin:
    ports:
      - "${MARTIN_PORT:-3000}:3000"
  demo:
    ports:
      - "${DEMO_PORT:-8080}:80"
  valhalla:
    ports:
      - "${VALHALLA_PORT:-8002}:8002"
  vroom:
    ports:
      - "${VROOM_PORT:-3001}:3000"   # 3001 host: martin already owns 3000 locally
  geocoder:
    ports:
      - "${GEOCODER_PORT:-2322}:2322"
  adapter:
    ports:
      - "${ADAPTER_PORT:-8010}:8000"
  normalizer:
    ports:
      - "${NORMALIZER_PORT:-8100}:8100"
