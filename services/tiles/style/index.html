<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NullMaps — Vietnam basemap demo (HCMC)</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
  <style>
    html, body, #map { margin: 0; height: 100%; width: 100%; }
    #badge {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      font: 13px/1.4 system-ui, sans-serif; background: #163300; color: #9fe870;
      padding: 6px 10px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="badge">NullMaps · self-hosted VN basemap · Ho Chi Minh City</div>
  <script>
    // PMTiles protocol (harmless when tiles come via Martin) — registered so a
    // pmtiles:// source also works if you serve the .pmtiles file directly.
    maplibregl.addProtocol("pmtiles", new pmtiles.Protocol().tile);

    // Full style (OMT layers + Hoàng Sa / Trường Sa labels), tiles + glyphs
    // both served by Martin behind Caddy /tiles — single origin, self-hosted.
    const map = new maplibregl.Map({
      container: "map",
      center: [106.700, 10.776],   // Ho Chi Minh City (lon, lat)
      zoom: 11,
      style: "/style.json"
    });
    map.addControl(new maplibregl.NavigationControl());
  </script>
</body>
</html>
