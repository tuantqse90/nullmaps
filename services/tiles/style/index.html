<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>NullMaps — Bản đồ Việt Nam tự host</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%2300b260'/><circle cx='16' cy='16' r='4.5' fill='white'/></svg>" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
  <style>
    :root {
      --green: #00b260; --green-d: #163300; --ink: #1a1f24; --muted: #6b7783;
      --panel: rgba(255,255,255,.97); --panel-b: #e4e8ec; --field: #f2f4f6; --shadow: 0 6px 24px rgba(20,30,40,.16);
    }
    * { box-sizing: border-box; }
    html, body, #map { margin: 0; height: 100%; width: 100%; }
    body { font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }
    #map { position: absolute; inset: 0; }
    .maplibregl-ctrl-top-right { margin-top: 64px; }

    /* ---- left panel: search + directions ---- */
    #panel {
      position: absolute; top: 12px; left: 12px; z-index: 5; width: 360px; max-width: calc(100vw - 24px);
      background: var(--panel); border: 1px solid var(--panel-b); border-radius: 14px; box-shadow: var(--shadow);
      overflow: visible; backdrop-filter: blur(6px);
    }
    .brand { display: flex; align-items: center; gap: 8px; padding: 11px 14px 3px; font-weight: 700; letter-spacing: .2px; }
    .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(0,178,96,.18); }
    .brand small { font-weight: 500; color: var(--muted); margin-left: auto; }
    .row { display: flex; gap: 8px; padding: 8px 12px; align-items: center; }
    .field { position: relative; flex: 1; }
    .field input {
      width: 100%; padding: 10px 12px 10px 34px; border: 1px solid var(--panel-b); border-radius: 10px;
      background: var(--field); font: inherit; color: inherit; outline: none;
    }
    .field input:focus { border-color: var(--green); background: #fff; }
    .field .pin { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: .7; }
    .iconbtn {
      flex: 0 0 auto; width: 40px; height: 40px; border: 1px solid var(--panel-b); border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 17px; color: var(--ink); display: grid; place-items: center;
    }
    .iconbtn:hover { border-color: var(--green); }
    .iconbtn.on { background: var(--green); color: #fff; border-color: var(--green); }
    .iconbtn.rm { width: 34px; height: 38px; font-size: 14px; }

    /* tool row (nearby / isochrone / share) */
    .tools { display: flex; gap: 6px; padding: 0 12px 8px; flex-wrap: wrap; }
    .tools button { flex: 1 1 auto; padding: 7px 8px; border: 1px solid var(--panel-b); background: #fff; color: var(--ink);
      border-radius: 999px; cursor: pointer; font: inherit; white-space: nowrap; }
    .tools button:hover { border-color: var(--green); }
    .tools button.on { background: var(--green); color: #fff; border-color: var(--green); }

    /* category chips (nearby) */
    #cats { display: none; gap: 6px; padding: 0 12px 8px; flex-wrap: wrap; }
    #cats.open { display: flex; }
    .chip { padding: 6px 11px; border: 1px solid var(--panel-b); background: var(--field); border-radius: 999px;
      cursor: pointer; font-size: 13px; white-space: nowrap; }
    .chip:hover { border-color: var(--green); background: #fff; }

    /* autocomplete dropdown */
    .ac { position: absolute; left: 0; right: 0; top: calc(100% + 4px); background: #fff; border: 1px solid var(--panel-b);
      border-radius: 10px; box-shadow: var(--shadow); z-index: 20; overflow: hidden; display: none; }
    .ac.open { display: block; }
    .ac div { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid #f0f2f4; }
    .ac div:last-child { border-bottom: 0; }
    .ac div:hover { background: #f5fbf7; }
    .ac b { font-weight: 600; } .ac small { color: var(--muted); display: block; }

    /* directions block */
    #dir { display: none; padding: 0 0 8px; }
    #dir.open { display: block; }
    .stop .pin { font-size: 12px; }
    .subrow { display: flex; align-items: center; gap: 10px; padding: 2px 12px 6px 52px; }
    .linkbtn { background: none; border: 0; color: var(--green-d); cursor: pointer; font: 600 13px system-ui; padding: 0; }
    body.dark .linkbtn { color: #9fe870; }
    .opt { display: flex; align-items: center; gap: 6px; margin-left: auto; color: var(--muted); cursor: pointer; user-select: none; }
    .modes { display: flex; gap: 6px; padding: 2px 12px 8px 52px; }
    .modes button { flex: 1; padding: 7px 0; border: 1px solid var(--panel-b); background: #fff; border-radius: 9px;
      cursor: pointer; font-size: 16px; }
    .modes button.on { background: var(--green-d); color: #9fe870; border-color: var(--green-d); }
    .go { margin: 2px 12px 0; }
    .go button { width: 100%; padding: 11px; border: 0; border-radius: 10px; background: var(--green); color: #fff;
      font: 600 14px system-ui; cursor: pointer; }
    .go button:active { transform: translateY(1px); }

    /* result / list card */
    #result { display: none; border-top: 1px solid var(--panel-b); }
    #result.open { display: block; }
    .summ { display: flex; align-items: baseline; gap: 10px; padding: 11px 14px 6px; }
    .summ .eta { font-size: 20px; font-weight: 700; color: var(--green-d); }
    body.dark .summ .eta { color: #9fe870; }
    .summ.list .eta { font-size: 16px; }
    .summ .km { color: var(--muted); }
    .summ .x { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 18px; }
    .steps { max-height: 38vh; overflow: auto; padding: 0 8px 8px; margin: 0; }
    .steps li { list-style: none; display: flex; gap: 10px; padding: 8px 8px; border-radius: 8px; cursor: default; }
    .steps li.pick { cursor: pointer; }
    .steps li:hover { background: #f5fbf7; }
    .steps li.leghdr { font-weight: 600; color: var(--green-d); background: var(--field); }
    body.dark .steps li.leghdr { color: #9fe870; }
    .steps .n { flex: 0 0 22px; height: 22px; border-radius: 50%; background: var(--field); color: var(--muted);
      display: grid; place-items: center; font-size: 12px; font-weight: 600; }
    .steps .d { color: var(--muted); font-size: 12px; }

    /* theme switch */
    #theme { position: absolute; top: 12px; right: 12px; z-index: 5; display: flex; gap: 0;
      background: var(--panel); border: 1px solid var(--panel-b); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
    #theme button { width: 42px; height: 42px; border: 0; background: transparent; cursor: pointer; font-size: 18px; }
    #theme button.on { background: var(--green); }

    #toast { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 9;
      background: #2b2f34; color: #fff; padding: 9px 16px; border-radius: 999px; font-size: 13px; box-shadow: var(--shadow);
      opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 86vw; text-align: center; }
    #toast.show { opacity: 1; }
    .ml-popup .maplibregl-popup-content { font: 13px system-ui; border-radius: 10px; padding: 10px 12px; }

    /* dark page chrome when the dark/terrain basemap is active */
    body.dark { --panel: rgba(26,29,33,.96); --panel-b: #313640; --ink: #e8edf2; --muted: #95a1ad; --field: #23272e; }
    body.dark .iconbtn, body.dark .modes button, body.dark .tools button, body.dark .ac,
    body.dark .field input:focus { background: #23272e; color: var(--ink); }
    body.dark .ac div:hover, body.dark .steps li:hover, body.dark .chip:hover { background: #2a2f37; }
    body.dark .ac div { border-bottom-color: #2a2f37; }

    /* phone layout */
    @media (max-width: 560px) {
      #panel { left: 8px; right: 8px; top: 8px; width: auto; max-width: none; }
      #theme { top: auto; bottom: 92px; right: 8px; }
      .maplibregl-ctrl-top-right { margin-top: 8px; }
      .steps { max-height: 28vh; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <div class="brand"><span class="dot"></span> NullMaps <small>Việt Nam · tự host</small></div>
    <div class="row">
      <div class="field">
        <span class="pin">🔍</span>
        <input id="q" placeholder="Tìm địa điểm, đường, quận…" autocomplete="off" />
        <div class="ac" id="ac-q"></div>
      </div>
      <button class="iconbtn" id="dir-toggle" title="Chỉ đường">🧭</button>
    </div>

    <div class="tools">
      <button id="t-near" title="Địa điểm gần đây">📍 Gần đây</button>
      <button id="t-iso" title="Vùng tới được trong X phút">⏱️ Vùng tới</button>
      <button id="t-share" title="Copy link chia sẻ">🔗 Chia sẻ</button>
    </div>
    <div id="cats"></div>

    <div id="dir">
      <div class="row" style="padding-bottom:4px">
        <div class="field"><span class="pin" style="color:#16a34a">A</span>
          <input id="from" placeholder="Điểm đi (gõ hoặc bấm bản đồ)" autocomplete="off" />
          <div class="ac" id="ac-from"></div></div>
      </div>
      <div id="stops"></div>
      <div class="row" style="padding-top:0">
        <div class="field"><span class="pin" style="color:#dc2626">B</span>
          <input id="to" placeholder="Điểm đến (gõ hoặc bấm bản đồ)" autocomplete="off" />
          <div class="ac" id="ac-to"></div></div>
      </div>
      <div class="subrow">
        <button class="linkbtn" id="add-stop">+ Thêm điểm dừng</button>
        <label class="opt"><input type="checkbox" id="opt-chk" /> Tối ưu thứ tự</label>
      </div>
      <div class="modes">
        <button data-mode="two_wheeler" class="on" title="Xe máy">🛵</button>
        <button data-mode="driving" title="Ô tô">🚗</button>
        <button data-mode="walking" title="Đi bộ">🚶</button>
      </div>
      <div class="go"><button id="route-btn">Tìm đường</button></div>
    </div>

    <div id="result">
      <div class="summ"><span class="eta" id="r-eta"></span><span class="km" id="r-km"></span>
        <span class="x" id="r-close" title="Đóng">✕</span></div>
      <ul class="steps" id="r-steps"></ul>
    </div>
  </div>

  <div id="theme">
    <button data-theme="light" title="Sáng">☀️</button>
    <button data-theme="dark" title="Tối">🌙</button>
    <button data-theme="terrain" title="Địa hình 3D">🏔️</button>
  </div>

  <div id="toast"></div>

  <script>
  "use strict";
  maplibregl.addProtocol("pmtiles", new pmtiles.Protocol().tile);

  // ---- keyless API proxy (gateway injects the key) ----
  const api = async (path, params) => {
    const u = new URL(location.origin + "/app" + path);
    for (const [k, v] of Object.entries(params)) if (v != null && v !== "") u.searchParams.set(k, v);
    const r = await fetch(u);
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  };
  const toast = (m) => { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 2600); };
  const debounce = (fn, ms) => { let h; return (...a) => { clearTimeout(h); h = setTimeout(() => fn(...a), ms); }; };
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const node = (h) => { const t = document.createElement("template"); t.innerHTML = h.trim(); return t.content.firstChild; };
  const fmtKm = (m) => m >= 1000 ? (m / 1000).toFixed(m >= 10000 ? 0 : 1) + " km" : Math.round(m) + " m";
  const fmtMin = (s) => { const m = Math.round(s / 60); return m >= 60 ? Math.floor(m / 60) + " giờ " + (m % 60) + " phút" : m + " phút"; };

  // ---- polyline (precision 5) -> [[lat,lng], ...] ----
  function decodePolyline(str, precision = 5) {
    let i = 0, lat = 0, lng = 0; const out = [], f = Math.pow(10, precision);
    while (i < str.length) {
      let r = 1, s = 0, b;
      do { b = str.charCodeAt(i++) - 63 - 1; r += b << s; s += 5; } while (b >= 0x1f);
      lat += r & 1 ? ~(r >> 1) : r >> 1; r = 1; s = 0;
      do { b = str.charCodeAt(i++) - 63 - 1; r += b << s; s += 5; } while (b >= 0x1f);
      lng += r & 1 ? ~(r >> 1) : r >> 1; out.push([lat / f, lng / f]);
    }
    return out;
  }

  // ---- map ----
  const BASE = { light: "/style.json", dark: "/style-dark.json" };
  let baseTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  let terrainOn = false;
  const map = new maplibregl.Map({ container: "map", style: location.origin + BASE[baseTheme], center: [106.700, 10.776], zoom: 12, maxPitch: 80 });
  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");
  map.addControl(new maplibregl.GeolocateControl({ trackUserLocation: true }), "top-right");
  map.addControl(new maplibregl.ScaleControl({ unit: "metric" }), "bottom-left");

  let routeGeo = null;                 // current route GeoJSON (re-added after setStyle)
  let isoGeo = null;                   // current isochrone FeatureCollection
  function paintRoute() {
    if (!map.getSource("route")) {
      map.addSource("route", { type: "geojson", data: routeGeo || { type: "FeatureCollection", features: [] } });
      map.addLayer({ id: "route-cap", type: "line", source: "route",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 8 } });
      map.addLayer({ id: "route-line", type: "line", source: "route",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#00b260", "line-width": 5 } });
    } else { map.getSource("route").setData(routeGeo || { type: "FeatureCollection", features: [] }); }
  }
  function paintIso() {
    const empty = { type: "FeatureCollection", features: [] };
    if (!map.getSource("iso")) {
      const before = map.getLayer("route-cap") ? "route-cap" : undefined;   // keep route drawn above the bands
      map.addSource("iso", { type: "geojson", data: isoGeo || empty });
      map.addLayer({ id: "iso-fill", type: "fill", source: "iso", paint: {
        "fill-color": ["interpolate", ["linear"], ["get", "contour"], 5, "#16a34a", 10, "#f59e0b", 15, "#dc2626"],
        "fill-opacity": 0.16 } }, before);
      map.addLayer({ id: "iso-line", type: "line", source: "iso", paint: {
        "line-color": ["interpolate", ["linear"], ["get", "contour"], 5, "#16a34a", 10, "#f59e0b", 15, "#dc2626"],
        "line-width": 1.5, "line-opacity": 0.7 } }, before);
    } else { map.getSource("iso").setData(isoGeo || empty); }
  }
  // Terrain as a 3D modifier on the current base style via setTerrain (NOT a separate
  // style) — avoids the maplibre 4.7.1 setStyle-diff-with-terrain "_checkLoaded" bug.
  function applyTerrain() {
    if (!terrainOn) { try { map.setTerrain(null); } catch (e) {} return; }
    if (!map.getSource("terrain"))
      map.addSource("terrain", { type: "raster-dem", url: location.origin + "/tiles/terrain", tileSize: 256, encoding: "mapbox" });
    map.setTerrain({ source: "terrain", exaggeration: 1.3 });
  }
  let restored = false;
  function onMapReady() { paintRoute(); paintIso(); applyTerrain(); if (!restored) { restored = true; restoreState(); } }
  map.on("load", onMapReady);
  map.on("style.load", () => { paintRoute(); paintIso(); applyTerrain(); });   // re-add overlays after a theme switch

  function selectTheme(t) {
    document.querySelectorAll("#theme button").forEach(b => b.classList.toggle("on", b.dataset.theme === t));
    if (t === "terrain") {                       // 3D ON the current light/dark base
      terrainOn = true; applyTerrain(); map.easeTo({ pitch: 62, duration: 700 });
    } else {                                     // plain base style + terrain off
      terrainOn = false; baseTheme = t;
      document.body.classList.toggle("dark", t === "dark");
      map.easeTo({ pitch: 0, duration: 400 });
      map.setStyle(location.origin + BASE[t]);
    }
  }
  document.querySelectorAll("#theme button").forEach(b => b.onclick = () => selectTheme(b.dataset.theme));
  document.body.classList.toggle("dark", baseTheme === "dark");
  document.querySelector('#theme button[data-theme="' + baseTheme + '"]').classList.add("on");

  // ---- markers ----
  let markers = [];
  const clearMarkers = () => { markers.forEach(m => m.remove()); markers = []; };
  function marker(lng, lat, color, label) {
    const m = new maplibregl.Marker({ color }).setLngLat([lng, lat]);
    if (label) m.setPopup(new maplibregl.Popup({ className: "ml-popup", offset: 28 }).setText(label));
    m.addTo(map); markers.push(m); return m;
  }

  // ---- autocomplete wiring (works for static + dynamically-added stop inputs) ----
  function attachAutocomplete(inputId, acId, onPick) {
    const input = document.getElementById(inputId), ac = document.getElementById(acId);
    const close = () => ac.classList.remove("open");
    input.addEventListener("input", debounce(async () => {
      const v = input.value.trim();
      if (v.length < 2) return close();
      try {
        const d = await api("/maps/api/place/autocomplete/json", { input: v });
        const seen = new Set();
        const ps = (d.predictions || []).filter(p => {
          const k = (p.structured_formatting?.main_text || p.description) + "|" + (p.structured_formatting?.secondary_text || "");
          if (seen.has(k)) return false; seen.add(k); return true;
        });
        if (!ps.length) { ac.innerHTML = '<div><small>Không tìm thấy</small></div>'; return ac.classList.add("open"); }
        ac.innerHTML = ps.slice(0, 6).map(p =>
          `<div data-name="${esc(p.structured_formatting?.main_text || p.description)}">` +
          `<b>${esc(p.structured_formatting?.main_text || p.description)}</b>` +
          (p.structured_formatting?.secondary_text ? `<small>${esc(p.structured_formatting.secondary_text)}</small>` : "") +
          `</div>`).join("");
        ac.querySelectorAll("div").forEach(el => el.onclick = () => { close(); onPick(el.dataset.name); });
        ac.classList.add("open");
      } catch (e) { toast("Lỗi kết nối"); }
    }, 250));
    input.addEventListener("blur", () => setTimeout(close, 180));
    return input;
  }

  async function geocode(name) {
    const d = await api("/maps/api/geocode/json", { address: name });
    const g = d.results && d.results[0];
    return g ? { lng: g.geometry.location.lng, lat: g.geometry.location.lat, label: g.formatted_address || g.name } : null;
  }

  // ---- search box ----
  let lastSearch = null;
  attachAutocomplete("q", "ac-q", async (name) => {
    document.getElementById("q").value = name;
    try {
      const p = await geocode(name);
      if (!p) return toast("Không tìm thấy");
      clearMarkers(); marker(p.lng, p.lat, "#00b260", p.label);
      lastSearch = { lat: p.lat, lng: p.lng, q: name };
      map.flyTo({ center: [p.lng, p.lat], zoom: 16 });
      markers[0].togglePopup();
    } catch (e) { toast("Lỗi kết nối"); }
  });

  // ---- directions (origin + intermediate stops + destination) ----
  let mode = "two_wheeler", A = null, B = null, optimize = false;
  let stops = [], stopSeq = 0;          // each: {id, lng, lat, label, row}
  const dir = document.getElementById("dir"), result = document.getElementById("result"), stopsBox = document.getElementById("stops");
  const dirToggle = document.getElementById("dir-toggle");
  function openDir() { dir.classList.add("open"); dirToggle.classList.add("on"); }
  dirToggle.onclick = () => { const open = dir.classList.toggle("open"); dirToggle.classList.toggle("on", open); };

  function setMode(m) { mode = m; document.querySelectorAll(".modes button").forEach(x => x.classList.toggle("on", x.dataset.mode === m)); }
  document.querySelectorAll(".modes button").forEach(b => b.onclick = () => setMode(b.dataset.mode));
  document.getElementById("opt-chk").onchange = (e) => { optimize = e.currentTarget.checked; };

  attachAutocomplete("from", "ac-from", async (name) => {
    document.getElementById("from").value = name; const p = await geocode(name).catch(() => null);
    if (p) { A = p; placePts(); } else toast("Không tìm thấy");
  });
  attachAutocomplete("to", "ac-to", async (name) => {
    document.getElementById("to").value = name; const p = await geocode(name).catch(() => null);
    if (p) { B = p; placePts(); } else toast("Không tìm thấy");
  });

  function addStop(point) {
    const id = "stop" + (++stopSeq);
    const row = node(
      `<div class="row stop" style="padding-top:0;padding-bottom:4px">
         <div class="field"><span class="pin" style="color:#d97706">◇</span>
           <input id="${id}" placeholder="Điểm dừng (gõ hoặc bấm bản đồ)" autocomplete="off" />
           <div class="ac" id="ac-${id}"></div></div>
         <button class="iconbtn rm" title="Xóa điểm dừng">✕</button>
       </div>`);
    stopsBox.appendChild(row);
    const st = { id, lng: null, lat: null, label: null, row };
    stops.push(st);
    attachAutocomplete(id, "ac-" + id, async (name) => {
      document.getElementById(id).value = name; const p = await geocode(name).catch(() => null);
      if (p) { st.lng = p.lng; st.lat = p.lat; st.label = p.label; placePts(); } else toast("Không tìm thấy");
    });
    row.querySelector(".rm").onclick = () => { row.remove(); stops = stops.filter(x => x !== st); placePts(); };
    if (point) {
      st.lng = point.lng; st.lat = point.lat; st.label = point.label || "Điểm dừng";
      document.getElementById(id).value = point.lat.toFixed(5) + "," + point.lng.toFixed(5);
    }
    return st;
  }
  document.getElementById("add-stop").onclick = () => { openDir(); addStop(); };

  function placePts() {
    clearMarkers();
    if (A) marker(A.lng, A.lat, "#16a34a", A.label || "Điểm đi");
    stops.forEach((s, i) => { if (s.lat != null) marker(s.lng, s.lat, "#d97706", s.label || ("Điểm dừng " + (i + 1))); });
    if (B) marker(B.lng, B.lat, "#dc2626", B.label || "Điểm đến");
  }

  document.getElementById("route-btn").onclick = async () => {
    if (!A || !B) return toast("Chọn điểm đi và điểm đến");
    const vias = stops.filter(s => s.lat != null);
    const params = { origin: `${A.lat},${A.lng}`, destination: `${B.lat},${B.lng}`, mode };
    if (vias.length) params.waypoints = (optimize ? "optimize:true|" : "") + vias.map(s => `${s.lat},${s.lng}`).join("|");
    try {
      const d = await api("/maps/api/directions/json", params);
      if (d.status !== "OK" || !d.routes?.length) return toast("Không tìm được đường");
      const route = d.routes[0], legs = route.legs;
      const pts = decodePolyline(route.overview_polyline.points).map(([la, ln]) => [ln, la]);
      routeGeo = { type: "Feature", geometry: { type: "LineString", coordinates: pts } };
      paintRoute();
      const lons = pts.map(p => p[0]), lats = pts.map(p => p[1]);
      const small = window.innerWidth < 560;
      map.fitBounds([[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
        { padding: small ? { top: 130, bottom: 50, left: 40, right: 40 } : { top: 60, bottom: 60, left: 390, right: 60 }, duration: 700 });
      const totM = legs.reduce((a, l) => a + l.distance.value, 0), totS = legs.reduce((a, l) => a + l.duration.value, 0);
      document.querySelector(".summ").classList.remove("list");
      document.getElementById("r-eta").textContent = fmtMin(totS);
      document.getElementById("r-km").textContent = fmtKm(totM) + (vias.length && optimize ? " · đã tối ưu" : "");
      let n = 0, html = "";
      legs.forEach((leg, li) => {
        if (legs.length > 1) html += `<li class="leghdr"><span class="n">${li + 1}</span><span>Chặng ${li + 1} · ${leg.distance.text} · ${leg.duration.text}</span></li>`;
        leg.steps.forEach(s => { n++; html += `<li><span class="n">${n}</span><span><span>${esc(s.html_instructions || "")}</span><span class="d"> · ${s.distance.text}</span></span></li>`; });
      });
      document.getElementById("r-steps").innerHTML = html;
      result.classList.add("open");
    } catch (e) { toast("Lỗi kết nối"); }
  };
  document.getElementById("r-close").onclick = () => {
    result.classList.remove("open"); routeGeo = null; paintRoute();
  };

  // ---- nearby (category chips around the current map center) ----
  const CATS = [
    { t: "restaurant", e: "🍜", n: "Ăn uống" }, { t: "cafe", e: "☕", n: "Cà phê" },
    { t: "fuel", e: "⛽", n: "Xăng" }, { t: "bank", e: "🏦", n: "Ngân hàng" },
    { t: "pharmacy", e: "💊", n: "Nhà thuốc" }, { t: "hospital", e: "🏥", n: "Bệnh viện" },
    { t: "hotel", e: "🏨", n: "Khách sạn" }, { t: "marketplace", e: "🛒", n: "Chợ" },
  ];
  const catsBox = document.getElementById("cats");
  catsBox.innerHTML = CATS.map(c => `<span class="chip" data-t="${c.t}" data-n="${c.n}">${c.e} ${c.n}</span>`).join("");
  document.getElementById("t-near").onclick = (e) => {
    const open = catsBox.classList.toggle("open"); e.currentTarget.classList.toggle("on", open);
  };
  catsBox.querySelectorAll(".chip").forEach(ch => ch.onclick = () => runNearby(ch.dataset.t, ch.dataset.n));
  async function runNearby(type, label) {
    const c = map.getCenter();
    try {
      const d = await api("/maps/api/place/nearbysearch/json", { location: `${c.lat},${c.lng}`, type, radius: 2500 });
      const res = (d.results || []).slice(0, 20);
      if (!res.length) return toast("Không có " + label + " gần đây");
      clearMarkers();
      res.forEach((r) => marker(r.geometry.location.lng, r.geometry.location.lat, "#7c3aed",
        `${r.name}${r.distance_m ? " · " + Math.round(r.distance_m) + "m" : ""}`));
      showList(label, res);
    } catch (e) { toast("Lỗi kết nối"); }
  }
  function showList(title, items) {
    routeGeo = null; paintRoute();
    document.querySelector(".summ").classList.add("list");
    document.getElementById("r-eta").textContent = title;
    document.getElementById("r-km").textContent = items.length + " kết quả";
    document.getElementById("r-steps").innerHTML = items.map((r, i) =>
      `<li class="pick" data-i="${i}"><span class="n">${i + 1}</span><span><span>${esc(r.name)}</span>` +
      `<span class="d"> · ${esc(r.vicinity || "")}${r.distance_m ? " · " + Math.round(r.distance_m) + "m" : ""}</span></span></li>`).join("");
    document.querySelectorAll("#r-steps li.pick").forEach(li => li.onclick = () => {
      const r = items[+li.dataset.i]; map.flyTo({ center: [r.geometry.location.lng, r.geometry.location.lat], zoom: 17 });
    });
    result.classList.add("open");
  }

  // ---- isochrone (reachability in 5/10/15 min from a clicked point) ----
  let isoActive = false;
  const isoBtn = document.getElementById("t-iso");
  const modeLabel = () => ({ two_wheeler: "xe máy", driving: "ô tô", walking: "đi bộ" }[mode] || mode);
  isoBtn.onclick = () => {
    isoActive = !isoActive; isoBtn.classList.toggle("on", isoActive);
    if (isoActive) toast("Bấm lên bản đồ để xem vùng tới được (" + modeLabel() + ")");
    else { isoGeo = null; paintIso(); }
  };
  async function runIso(lng, lat) {
    try {
      toast("Đang tính vùng tới được…");
      const d = await api("/v1/isochrone", { location: `${lat},${lng}`, contours: "5,10,15", mode });
      if (!d || !d.features || !d.features.length) return toast("Không tính được vùng");
      d.features.sort((a, b) => (b.properties.contour || 0) - (a.properties.contour || 0));  // big first -> concentric
      isoGeo = d; paintIso();
      clearMarkers(); marker(lng, lat, "#0ea5e9", "Điểm xuất phát · 5/10/15 phút " + modeLabel());
      toast("Vùng tới được: 5 / 10 / 15 phút");
    } catch (e) { toast("Lỗi kết nối"); }
  }

  // ---- share link ----
  document.getElementById("t-share").onclick = async () => {
    const u = new URL(location.origin + location.pathname);
    if (A && B) {
      const pts = [A, ...stops.filter(s => s.lat != null), B].map(p => `${p.lat.toFixed(5)},${p.lng.toFixed(5)}`).join(";");
      u.searchParams.set("route", pts); u.searchParams.set("mode", mode);
      if (optimize) u.searchParams.set("opt", "1");
    } else if (lastSearch) {
      u.searchParams.set("ll", `${lastSearch.lat.toFixed(5)},${lastSearch.lng.toFixed(5)}`);
      if (lastSearch.q) u.searchParams.set("q", lastSearch.q);
    } else {
      const c = map.getCenter();
      u.searchParams.set("ll", `${c.lat.toFixed(5)},${c.lng.toFixed(5)}`); u.searchParams.set("z", Math.round(map.getZoom()));
    }
    const link = u.toString();
    try { await navigator.clipboard.writeText(link); toast("Đã copy link chia sẻ"); }
    catch (e) { prompt("Link chia sẻ:", link); }
  };

  function restoreState() {
    const p = new URLSearchParams(location.search);
    if (p.get("route")) {
      const raw = p.get("route").split(";").map(s => s.split(",").map(Number)).filter(a => a.length === 2 && a.every(Number.isFinite));
      if (raw.length >= 2) {
        openDir();
        A = { lng: raw[0][1], lat: raw[0][0], label: "Điểm đi" }; document.getElementById("from").value = `${A.lat},${A.lng}`;
        const last = raw[raw.length - 1];
        B = { lng: last[1], lat: last[0], label: "Điểm đến" }; document.getElementById("to").value = `${B.lat},${B.lng}`;
        raw.slice(1, -1).forEach(a => addStop({ lng: a[1], lat: a[0] }));
        if (p.get("mode")) setMode(p.get("mode"));
        if (p.get("opt") === "1") { optimize = true; document.getElementById("opt-chk").checked = true; }
        placePts();
        setTimeout(() => document.getElementById("route-btn").click(), 500);
      }
    } else if (p.get("ll")) {
      const [la, ln] = p.get("ll").split(",").map(Number);
      if (Number.isFinite(la) && Number.isFinite(ln)) {
        clearMarkers(); marker(ln, la, "#00b260", p.get("q") || "Vị trí");
        lastSearch = { lat: la, lng: ln, q: p.get("q") || "" };
        map.flyTo({ center: [ln, la], zoom: p.get("z") ? +p.get("z") : 16, duration: 0 });
        if (p.get("q")) document.getElementById("q").value = p.get("q");
        markers[0].togglePopup();
      }
    }
  }

  // ---- map click: isochrone | set directions points | reverse-geocode ----
  map.on("click", async (e) => {
    const { lng, lat } = e.lngLat;
    if (isoActive) return runIso(lng, lat);
    if (dir.classList.contains("open")) {
      if (!A) { A = { lng, lat, label: "Điểm đi" }; document.getElementById("from").value = `${lat.toFixed(5)},${lng.toFixed(5)}`; }
      else if (!B) { B = { lng, lat, label: "Điểm đến" }; document.getElementById("to").value = `${lat.toFixed(5)},${lng.toFixed(5)}`; }
      else { addStop({ lng, lat }); }   // A & B set -> extra clicks add intermediate stops
      placePts(); return;
    }
    try {
      const d = await api("/maps/api/geocode/json", { latlng: `${lat},${lng}` });
      const addr = d.results?.[0]?.formatted_address || "Không rõ địa chỉ";
      new maplibregl.Popup({ className: "ml-popup", offset: 8 }).setLngLat([lng, lat]).setText(addr).addTo(map);
    } catch (err) { /* ignore */ }
  });
  </script>
</body>
</html>
